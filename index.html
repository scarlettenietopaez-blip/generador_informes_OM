<body>
<header class="no-print"><h1>Generador de Informes de Obras Mayores</h1><p>GitHub Pages + CSV editables en carpeta data.</p></header>
<main><div class="grid">
<aside>
<div class="card no-print"><h2>Identificación</h2>
<div class="field"><label>Nro. eGOB principal *</label><input id="egob" inputmode="numeric"></div>
<div class="field"><label>Técnico revisor *</label><input id="tecnico" list="listaTecnicos"><datalist id="listaTecnicos"></datalist></div>
<div class="field"><label>Tipo de informe *</label><select id="tipoInforme"><option></option><option>Informe con Observaciones</option><option>Informe Técnico Aprobatorio</option></select></div>
<div class="row"><div class="field"><label id="fechaRevisionLabel">Fecha de revisión *</label><input id="fechaRevision" type="date"></div><div class="field" id="fechaSubWrap"><label>Fecha máxima subsanación</label><input id="fechaSubsanacion" type="date"></div></div>
<div class="side-actions"><button onclick="tabAnterior()">Atrás</button><button onclick="nuevoFormulario()">Nuevo</button><button class="ok" onclick="guardarFormulario()">Guardar</button><button class="ok" onclick="guardarYSeguir()">Guardar y sig.</button></div><div id="msg" class="alert hidden"></div></div>
<div class="card no-print"><h2>Buscar informe registrado</h2><div class="field"><label>Nro. eGOB guardado</label><input id="buscarEgobSide" inputmode="numeric"></div><div class="btns"><button onclick="cargarPorBusqueda()">Buscar</button><button onclick="renderSavedList()">Actualizar</button></div><div id="guardadosLista"></div><div class="btns"><button onclick="exportarRespaldo()">Exportar respaldo</button><label class="btn"><input type="file" id="importFile" accept=".json" style="display:none" onchange="importarRespaldo(event)">Importar respaldo</label></div></div>
</aside>
<section>
<div class="tabs no-print"><button class="tab-btn active" data-tab="tab-info">Información general</button><button class="tab-btn" data-tab="tab-req">Requisitos</button><button class="tab-btn" data-tab="tab-obs">Observaciones</button><button class="tab-btn" data-tab="tab-apr">Aprobatorio</button><button class="tab-btn" data-tab="tab-vista">Vista del informe</button></div>
<div id="tab-info" class="tab active card no-print"><h2>Información general</h2><div id="propietariosBox"></div><div id="infoForm"></div></div>
<div id="tab-req" class="tab card no-print"><h2>Requisitos</h2><div id="requisitosForm"></div></div>
<div id="tab-obs" class="tab card no-print"><h2>Observaciones</h2><div id="observacionesForm"></div></div>
<div id="tab-apr" class="tab card no-print"><h2>Informe aprobatorio</h2><div id="aprobatorioForm"></div></div>
<div id="tab-vista" class="tab"><div id="copyPanel" class="copy-panel no-print hidden"><button id="btnCopy" onclick="copiarInformeAprobatorio()">📋</button><button onclick="imprimirInforme()">PDF</button></div><div class="report-wrap"><div id="report" class="report"></div></div></div>
</section></div></main>

function parseCSV(text){text=(text||'').replace(/^\uFEFF/,'');let rows=[],row=[],cell='',q=false;for(let i=0;i<text.length;i++){let c=text[i],n=text[i+1];if(q){if(c=='"'&&n=='"'){cell+='"';i++}else if(c=='"')q=false;else cell+=c}else{if(c=='"')q=true;else if(c==','){row.push(cell);cell=''}else if(c=='\n'){row.push(cell);rows.push(row);row=[];cell=''}else if(c!='\r')cell+=c}}if(cell.length||row.length){row.push(cell);rows.push(row)}if(!rows.length)return[];let h=rows.shift().map(x=>String(x||'').trim());return rows.filter(r=>r.some(c=>String(c||'').trim())).map(r=>{let o={};h.forEach((k,i)=>o[k]=r[i]??'');return o})}

function split(v){return String(v||'').split('|').map(x=>x.trim()).filter(Boolean)} function active(r){let v=String(r.Activo||r.activo||'').toLowerCase();return !v||['sí','si','true','1'].includes(v)}

function put(store,obj){return new Promise((res,rej)=>{let tx=db.transaction(store,'readwrite');tx.objectStore(store).put(obj);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error)})} function get(store,key){return new Promise((res,rej)=>{let tx=db.transaction(store,'readonly');let r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error)})} function all(store){return new Promise((res,rej)=>{let tx=db.transaction(store,'readonly');let r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=e=>rej(e.target.error)})}

function estudiosReport(){return`<table class="informe-table"><thead><tr><th>Estudio</th><th colspan="2">Documento</th></tr></thead><tbody>${state.aprobatorio.estudios.map(r=>`<tr><td><strong>${esc(r.estudio)}</strong></td><td>${esc(r.documento)}</td><td>${esc(fmtDate(r.fecha))}</td></tr><tr><td></td><td colspan="2">${esc(r.evidencia)}</td></tr>`).join('')}</tbody></table>`}
function conclusionReport(){return`<table class="informe-table"><thead><tr><th colspan="2">Descripción</th><th>Cantidad</th><th>Unidad</th></tr></thead><tbody>${state.aprobatorio.conclusion.map(r=>`<tr><td>${esc(r.descripcion)}</td><td>${esc((r.niveles||[]).join(', '))}</td><td>${esc(r.cantidad)}</td><td>${esc(r.unidad)}</td></tr>`).join('')}</tbody></table>`}
function reportApr(){ensureAprob();let n=1,alert=(DATA.requisitos||[]).filter(r=>(state.requisitos[r.id]||{}).estado==='No Cumple').length;let base=tmpl(DATA.plantillaAprobatorio,'BLG_001').Texto_Base||'';let html=reportHeader(tmpl(DATA.plantillaAprobatorio,'ENC_002').Texto_Base||'INFORME TÉCNICO APROBATORIO');if(alert)html+=`<div class="apr-alert">ALERTA: Existen ${alert} requisito(s) marcado(s) como NO CUMPLE.</div>`;html+=`<h2>${n++}. Información general</h2>${infoAprTable()}<h2>${n++}. Detalle del proyecto</h2><p>${esc(tmpl(DATA.plantillaAprobatorio,'INF_002').Texto_Base||'')}</p>${reqTableCumple()}<h2>${n++}. Base técnico - legal</h2><p>${esc(base)}</p>`;let oblig=(parseFloat(infoValue('ALTURA EDIFICACIÓN'))||0)>2||(parseFloat(infoValue('Área Bruta'))||0)>400;if(oblig||state.aprobatorio.anteproyecto.activo)html+=`<h2>${n++}. Resolución de Anteproyecto</h2>${structureReport('anteproyecto')}`;html+=`<h2>${n++}. Consideraciones estructurales</h2>${structureReport('estructural')}<h2>${n++}. Estudios complementarios</h2>${estudiosReport()}<h2>${n++}. Conclusión técnica</h2><p>Se concluye emitir el presente <strong>INFORME TÉCNICO FAVORABLE</strong>, de conformidad al siguiente detalle:</p>${conclusionReport()}<p>${esc(replaceText(tmpl(DATA.plantillaAprobatorio,'CON_002').Texto_Base||''))}</p>`;return html}
function renderReport(){collectTop();let isObs=state.tipoInforme==='Informe con Observaciones';document.body.classList.toggle('printing-observaciones',isObs);document.body.classList.toggle('printing-aprobatorio',!isObs);let h=!state.tipoInforme?'<p>Seleccione tipo de informe.</p>':isObs?reportObs():reportApr();let r=document.getElementById('report');r.className='report '+(isObs?'report-observaciones':'report-aprobatorio');r.innerHTML=h;document.getElementById('copyPanel').classList.toggle('hidden',document.querySelector('.tab.active')?.id!=='tab-vista');document.getElementById('btnCopy').classList.toggle('hidden',!state.tipoInforme.includes('Aprobatorio'));return h}
function showTab(id){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id===id));renderReport()}
function tabs(){let arr=['tab-info','tab-req'];if(state.tipoInforme==='Informe con Observaciones')arr.push('tab-obs');if(state.tipoInforme==='Informe Técnico Aprobatorio')arr.push('tab-apr');arr.push('tab-vista');return arr}function updateTabs(){let a=tabs();document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('hidden',!a.includes(b.dataset.tab)));if(!a.includes(document.querySelector('.tab.active')?.id))showTab('tab-info')}
function tabAnterior(){let a=tabs(),i=a.indexOf(document.querySelector('.tab.active')?.id);showTab(a[Math.max(0,i-1)])} async function guardarYSeguir(){await guardarFormulario(false);let a=tabs(),i=a.indexOf(document.querySelector('.tab.active')?.id);showTab(a[Math.min(a.length-1,i+1)])}
async function guardarFormulario(show=true){collectTop();if(!state.egob||!state.tecnico||!state.tipoInforme){msg('Complete eGOB, técnico y tipo de informe.');return false}state.updatedAt=new Date().toISOString();if(!state.createdAt)state.createdAt=state.updatedAt;await put(STORE,JSON.parse(JSON.stringify(state)));if(show)msg('Formulario guardado.',true);renderSavedList();return true}
async function cargarFormulario(egob){let o=await get(STORE,egob);if(!o){msg('No se encontró el eGOB.');return}state=Object.assign(defaultState(),o);applyState();msg('Informe cargado.',true)}function applyState(){document.getElementById('egob').value=state.egob;document.getElementById('tecnico').value=state.tecnico;document.getElementById('tipoInforme').value=state.tipoInforme;document.getElementById('fechaRevision').value=state.fechaRevision;document.getElementById('fechaSubsanacion').value=state.fechaSubsanacion;renderInfoForm();renderRequisitos();renderObservaciones();renderAprobatorio();updateTabs();renderReport()}
function nuevoFormulario(){state=defaultState();applyState()}async function renderSavedList(){if(!db)return;let arr=await all(STORE);document.getElementById('guardadosLista').innerHTML=arr.map(x=>`<div class="saved-card"><strong>eGOB ${esc(x.egob)} · ${esc(x.tipoInforme)}</strong><br><span class="mini">Técnico: ${esc(x.tecnico)}<br>Actualizado: ${esc((x.updatedAt||'').slice(0,16).replace('T',' '))}</span><div class="btns"><button class="small" onclick="cargarFormulario('${esc(x.egob)}')">Abrir</button></div></div>`).join('')}
function cargarPorBusqueda(){cargarFormulario(onlyDigits(document.getElementById('buscarEgobSide').value))}
async function exportarRespaldo(){let forms=await all(STORE),manual=await all(MANUAL_STORE);let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({forms,manual},null,2)],{type:'application/json'}));a.download='respaldo_informes_'+today()+'.json';a.click()}
async function importarRespaldo(ev){let f=ev.target.files[0];if(!f)return;let d=JSON.parse(await f.text());for(const x of d.forms||[])await put(STORE,x);for(const x of d.manual||[])await put(MANUAL_STORE,x);renderSavedList();msg('Respaldo importado.',true)}
async function exportarObsManualesCSV(){let arr=await all(MANUAL_STORE);let headers=['codigo','componente','tema','observacion','norma','correccion','egob','fecha'];let lines=[headers.join(',')];arr.forEach(o=>lines.push(headers.map(h=>`"${String(o[h]||'').replace(/"/g,'""')}"`).join(',')));let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv'}));a.download='observaciones_manuales_'+today()+'.csv';a.click()}
async function copiarInformeAprobatorio(){if(state.tipoInforme!=='Informe Técnico Aprobatorio')return;let temp=document.createElement('div');temp.innerHTML=reportApr();try{await navigator.clipboard.writeText(temp.innerText);msg('Informe copiado.',true)}catch(e){msg('No se pudo copiar. Copie manualmente desde la vista.')}}
function imprimirInforme(){renderReport();showTab('tab-vista');window.print()}
async function init(){await loadData();document.getElementById('fechaRevision').value=today();document.getElementById('fechaSubsanacion').value=addBusinessDays(today(),10);DATA.tecnicos.filter(active).forEach(t=>{let o=document.createElement('option');o.value=t.Nombre;document.getElementById('listaTecnicos').appendChild(o)});document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));['egob','tecnico','tipoInforme','fechaRevision','fechaSubsanacion'].forEach(id=>document.getElementById(id).oninput=()=>{collectTop();if(id==='tipoInforme'){document.getElementById('fechaRevisionLabel').textContent=state.tipoInforme.includes('Aprobatorio')?'Fecha de emisión *':'Fecha de revisión *';document.getElementById('fechaSubWrap').classList.toggle('hidden',state.tipoInforme.includes('Aprobatorio'));updateTabs()}renderReport()});await openDB();applyState();renderSavedList()}
window.addEventListener('load',init);
</script>
